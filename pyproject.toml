[project]
name = "wordlist-generation"
version = "0.1.0"
description = "Constrained generation server using vLLM OpenAI server + LM Format Enforcer (proxied by FastAPI)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "click",
    "fastapi[standard]",
    "httpx",
    "lm-format-enforcer",
    "openai>=1.0.0",
    "pydantic",
    "transformers",
    "python-dotenv",
    "vllm",
]
[dependency-groups]
dev = [
    "ruff",
]
[tool.setuptools]
py-modules = ["client", "common", "server"]

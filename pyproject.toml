[project]
name = "wordlist-generation"
version = "0.2.0"
description = "Vocabulary-constrained generation server (FastAPI + TensorRT-LLM + lm-format-enforcer)"
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
    "fastapi[standard]",
    "httpx",
    "lm-format-enforcer>=0.10.0",
    "pydantic>=2",
    "python-dotenv",
    "transformers>=4.44",
    "tiktoken",
    "sentencepiece",
    "numpy<2",        # pin to avoid NumPy 2.x ABI mismatch
    "PyYAML>=6.0",    # to parse parallel_config.yaml
]

[dependency-groups]
dev = ["ruff"]

[tool.setuptools]
py-modules = ["server"]

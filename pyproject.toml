[project]
name = "wordlist-generation"
version = "0.1.0"
description = "Vocabulary-constrained generation server (FastAPI + TensorRT-LLM + lm-format-enforcer)"
readme = "README.md"
requires-python = ">=3.10,<3.13"  # match TRT-LLM container's Python (3.10)
dependencies = [
    "fastapi[standard]",
    "pydantic>=2",
    "python-dotenv",
    "pynvml>=11.5.0",
    "lm-format-enforcer>=0.10.0",
    "huggingface_hub",
    # For chat templates:
    "transformers",
    "sentencepiece",
]

[dependency-groups]
dev = ["ruff"]

[tool.setuptools]
py-modules = ["server_trtllm"]

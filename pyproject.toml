[project]
name = "wordlist-generation"
version = "0.2.0"
description = "Constrained generation proxy using vLLM OpenAI server + LM Format Enforcer (guided decoding)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]",
    "httpx",
    "lm-format-enforcer",
    "pydantic>=2",
    "python-dotenv",
    "vllm",            # required for running the vLLM OpenAI server
    # "transformers",  # not required by this proxy anymore; uncomment if you still need it elsewhere
]

[dependency-groups]
dev = [
    "ruff",
]

[tool.setuptools]
py-modules = ["client", "common", "server"]

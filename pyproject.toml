[project]
name = "wordlist-generation"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    # "accelerate>=1.10.1", # Removed: vLLM manages its own acceleration.
    "click",
    "fastapi[standard]",
    "httpx",
    "lm-format-enforcer",
    "openai>=1.0.0", # CORRECTED: Changed from 2.1.0, which is not a valid version.
